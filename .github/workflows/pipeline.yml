name: SYNQ Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [master]

jobs:
  install:
    name: "1 - Install Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm ci --prefer-offline

      - name: Install SDK dependencies
        run:  cd sdk && npm ci && cd ..

      - name: Verify lockfile integrity
        run:  npm ls --all --json > /dev/null 2>&1

  lint:
    name: "2 - Lint & Type Check"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Run ESLint
        run: npx eslint src/ --max-warnings 0

      - name: TypeScript check (app)
        run: npx tsc --noEmit

      - name: TypeScript check (SDK)
        run: cd sdk && npx tsc --noEmit

  build-sdk:
    name: "3 - Build SDK"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Compile SDK TypeScript
        run: cd sdk && npm run build

      - name: Generate type declarations
        run: tsc --declaration

      - name: Validate SDK exports
        run: node -e "import('./sdk/dist/index.js')"

  build-app:
    name: "4 - Build Next.js App"
    runs-on: ubuntu-latest
    needs: [lint, build-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Next.js production build (Turbopack)
        run: npm run build

      - name: Generate static pages (26 routes)
        # Real: part of 
        run: next build

  db-check:
    name: "5 - Database Migration Check"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Supabase
        run: npx supabase db push --dry-run --db-url $DATABASE_URL

      - name: Validate 001_initial_schema.sql
        run:  psql $DATABASE_URL -f supabase/migrations/001_initial_schema.sql --dry-run

      - name: Validate 002_subscriptions_schema.sql
        run: psql $DATABASE_URL -f supabase/migrations/002_subscriptions_schema.sql --dry-run

      - name: Validate 003_add_invoice_field.sql
        run: psql $DATABASE_URL -f supabase/migrations/003_add_invoice_field.sql --dry-run

  api-tests:
    name: "6 - API Integration Tests"
    runs-on: ubuntu-latest
    needs: [build-app, db-check]
    steps:
      - uses: actions/checkout@v4

      - name: Test POST /api/payments/verify
        run: curl -sf -X POST http://localhost:3000/api/payments/verify -d '{"txHash":"0x..."}' | jq .

      - name: Test POST /api/merchants/verify
        run: curl -sf -X POST http://localhost:3000/api/merchants/verify -H "x-api-key: test" | jq .

      - name: Test POST /api/subscriptions/create
        run: curl -sf -X POST http://localhost:3000/api/subscriptions/create -d '{"planId":"..."}' | jq .

      - name: Test GET /api/plans/list
        run: curl -sf http://localhost:3000/api/plans/list?merchantId=test | jq .

      - name: Test POST /api/agents/run
        run: curl -sf -X POST http://localhost:3000/api/agents/run -d '{"prompt":"test"}' | jq .

      - name: Test POST /api/access/verify
        run: curl -sf -X POST http://localhost:3000/api/access/verify -d '{"wallet":"0x..."}' | jq .

  deploy:
    name: "7 - Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Upload build artifacts
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Wait for deployment ready
        run: npx vercel inspect $DEPLOY_URL --wait --token=${{ secrets.VERCEL_TOKEN }}

      - name: Post-deploy health check
        run: curl -sf https://synq-khaki.vercel.app/api/payments/verify > /dev/null
